name: Issue auto-response
on:
  issues:
    types: [opened]
permissions:
  issues: write
jobs:
  respond:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.issue.labels.map(label => label.name);
            let body = 'Hello, world!';
            if (labels.includes('bug')) body = 'Thank you. We will fix it.';
            else if (labels.includes('feature')) body = 'Thank you, we will consider to include this feature.';
            await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.payload.issue.number, body});
